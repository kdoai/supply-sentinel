name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Syntax check
        run: |
          node --check web/js/app.js
          node --check web/js/panels.js
          node --check web/js/map.js
          node --check web/js/flow.js
          node --check web/js/network.js
          node --check web/js/propagation.js
          node --check src/serve.mjs
          node --check src/build-web.mjs
          node --check src/function_app/timerTrigger.mjs
          node --check src/function_app/httpLatestDashboard.mjs
          node --check src/supply_sentinel/config.mjs
          node --check src/supply_sentinel/aiClient.mjs
          node --check src/supply_sentinel/liveEvidence.mjs
          node --check src/supply_sentinel/evidenceTimeline.mjs
          node --check src/supply_sentinel/researchAgent.mjs
          node --check src/supply_sentinel/ingestion.mjs
          node --check src/supply_sentinel/workflow.mjs
          node --check src/supply_sentinel/stateStore.mjs
          node --check src/supply_sentinel/networkSchema.mjs
          node --check src/supply_sentinel/propagationEngine.mjs
          node --check scripts/validate-scenario.mjs

      - name: Run tests
        run: npm test

      - name: Validate scenario contracts
        run: |
          node scripts/validate-scenario.mjs naphtha-asia-allocation
          node scripts/validate-scenario.mjs packaging-film-typhoon
          node scripts/validate-scenario.mjs adhesive-eu-logistics
          node scripts/validate-scenario.mjs naphtha-price-spike

      - name: Build web assets
        run: npm run build:web

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: supply-sentinel-web
          path: web/
          if-no-files-found: error
