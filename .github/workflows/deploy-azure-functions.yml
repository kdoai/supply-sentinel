name: Deploy Azure Functions

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Application mode"
        required: true
        default: "demo"
        type: choice
        options:
          - demo
          - cloud

permissions:
  contents: read
  id-token: write

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: ${{ vars.AZURE_FUNCTIONAPP_PACKAGE_PATH || '.' }}
  NODE_VERSION: "20"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Syntax check
        run: |
          node --check web/js/app.js
          node --check web/js/panels.js
          node --check web/js/map.js
          node --check src/serve.mjs

      - name: Run tests
        run: npm test

      - name: Build web assets
        run: npm run build:web

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: azure-functions-package
          path: |
            src/
            data/
            web/
            package.json
            README.md
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: azure-demo

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: azure-functions-package
          path: .

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Set runtime mode
        uses: azure/cli@v2
        with:
          inlineScript: |
            az functionapp config appsettings set \
              --name "${{ vars.AZURE_FUNCTIONAPP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --settings RUN_MODE="${{ inputs.run_mode }}"
