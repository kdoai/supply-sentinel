<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supply Sentinel - 供給リスク早期警戒</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="画面切り替え">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">S</div>
        <div>
          <h1>Supply Sentinel</h1>
          <p>供給リスク早期警戒</p>
        </div>
      </div>

      <nav class="side-nav">
        <button class="nav-item is-active" type="button" data-view="dashboard">監視ダッシュボード</button>
        <button class="nav-item" type="button" data-view="analysis">影響分析</button>
        <button class="nav-item" type="button" data-view="response">初動対応</button>
      </nav>

      <div class="sidebar-footer">
        <span class="status-dot" aria-hidden="true"></span>
        <span>定期監視中</span>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">供給リスク監視</p>
          <h2 id="view-title">監視ダッシュボード</h2>
        </div>
        <div class="topbar-meta">
          <span id="scenario"></span>
          <span id="generated-at"></span>
        </div>
      </header>

      <section class="view is-active" id="view-dashboard" data-view-panel="dashboard">
        <div class="dashboard-grid">
          <section class="panel map-panel">
            <div class="panel-head map-head">
              <div>
                <h3>グローバル供給網</h3>
                <p>外部リスクを自社の調達・工場・顧客影響に接続</p>
              </div>
              <div id="map-legend"></div>
            </div>
            <canvas id="world-map"></canvas>
            <div id="map-tooltip" hidden></div>
          </section>

          <aside class="dashboard-side">
            <section class="panel risk-panel">
              <div class="panel-head compact-head">
                <h3>リスク判定</h3>
                <span class="panel-note">AI抽出 + 業務ルール</span>
              </div>
              <div id="risk-gauge"></div>
            </section>

            <section class="panel kpi-panel">
              <div class="panel-head compact-head">
                <h3>業務影響</h3>
                <span class="panel-note">在庫・BOM・受注照合</span>
              </div>
              <div id="kpi-grid"></div>
            </section>
          </aside>

          <section class="panel mix-panel">
            <div class="panel-head compact-head">
              <h3>調達構成</h3>
              <span class="panel-note">影響を受ける供給ルート</span>
            </div>
            <div id="sourcing-mix"></div>
          </section>

          <section class="panel summary-panel">
            <div class="panel-head compact-head">
              <h3>初動サマリ</h3>
              <span class="panel-note">人の承認前提</span>
            </div>
            <ul id="overview-actions-list"></ul>
          </section>
        </div>
      </section>

      <section class="view" id="view-analysis" data-view-panel="analysis">
        <div class="analysis-grid">
          <section class="panel flow-panel">
            <div class="panel-head">
              <h3>業務フロー</h3>
              <span class="panel-note">原材料から顧客影響まで</span>
            </div>
            <div id="flow-graph"></div>
          </section>

          <section class="panel orders-panel">
            <div class="panel-head">
              <h3>影響受注一覧</h3>
              <span class="panel-note">優先度順に確認</span>
            </div>
            <div id="orders-table"></div>
          </section>
        </div>
      </section>

      <section class="view" id="view-response" data-view-panel="response">
        <div class="response-grid">
          <section class="panel">
            <div class="panel-head">
              <h3>検知根拠</h3>
              <span class="panel-note">外部情報</span>
            </div>
            <ul id="evidence-list"></ul>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>推奨初動</h3>
              <span class="panel-note">担当者が確認</span>
            </div>
            <ul id="actions-list"></ul>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>承認が必要な判断</h3>
              <span class="panel-note">人が最終承認</span>
            </div>
            <ul id="approval-list"></ul>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
