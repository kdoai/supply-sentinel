<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supply Sentinel - Global Sourcing Risk</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">Supply Sentinel</span>
      <span class="brand-tagline">External supply risk -> internal business impact</span>
    </div>
    <div class="topbar-meta">
      <span id="scenario"></span>
      <span id="generated-at"></span>
    </div>
  </header>

  <main class="layout">
    <section class="map-panel">
      <div class="panel-head">
        <h2>Global Sourcing Map</h2>
        <div id="map-legend"></div>
      </div>
      <canvas id="world-map"></canvas>
      <div id="map-tooltip" hidden></div>
    </section>

    <aside class="side">
      <div id="risk-gauge"></div>
      <div id="kpi-grid"></div>
      <div class="card">
        <h3>Sourcing Mix</h3>
        <div id="sourcing-mix"></div>
      </div>
    </aside>

    <section class="flow-panel">
      <div class="panel-head">
        <h2>Supply Process Flow</h2>
      </div>
      <div id="flow-graph"></div>
    </section>

    <section class="tables">
      <div class="card">
        <h3>Impacted Orders</h3>
        <div id="orders-table"></div>
      </div>
      <div class="card">
        <h3>Evidence</h3>
        <ul id="evidence-list"></ul>
      </div>
      <div class="card">
        <h3>Recommended First Actions</h3>
        <ul id="actions-list"></ul>
      </div>
      <div class="card">
        <h3>Human Approval Required</h3>
        <ul id="approval-list"></ul>
      </div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
